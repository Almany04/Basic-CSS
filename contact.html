<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kapcsolat</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="site-container p-3">
        <main class="my-4">
            <h1>Kapcsolatfelvétel</h1>
            <p>Kérdésed van? Vedd fel velünk a kapcsolatot az alábbi űrlap segítségével!</p>
            <div class="row">
                <div class="col-md-7">
                    <form>
                        <div class="mb-3"><label class="form-label">Név:</label><input type="text" class="form-control"></div>
                        <div class="mb-3"><label class="form-label">E-mail cím:</label><input type="email" class="form-control"></div>
                        <div class="mb-3">
                            <label class="form-label">Ügy típusa:</label>
                            <select class="form-select">
                                <option selected>Kérjük, válasszon...</option>
                                <option>Termék meghibásodás</option>
                                <option>Raktárkészlet kérdés</option>
                                <option>Összeszerelés</option>
                                <option>Egyéb</option>
                            </select>
                        </div>
                        <div class="mb-3"><label class="form-label">Üzenet:</label><textarea class="form-control" rows="5"></textarea></div>
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" id="warrantyCheck">
                            <label class="form-check-label" for="warrantyCheck">Garanciális problémáról van szó</label>
                        </div>
                        <button type="submit" class="btn btn-primary"><i class="bi bi-send"></i> Üzenet küldése</button>
                    </form>
                </div>
                <div class="col-md-5">
                    <h5>Térkép</h5>
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2693.882655314718!2d19.04399897693963!3d47.53034039206159!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x4741d9cde7852b1d%3A0x8904e53234dfb147!2sBudapest%2C%20B%C3%A9csi%20%C3%BAt%2096%2Fb%2C%201034!5e0!3m2!1shu!2shu!4v1715875221946!5m2!1shu!2shu" width="100%" height="350" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                </div>
            </div>
        </main>
        
        </div>

      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
